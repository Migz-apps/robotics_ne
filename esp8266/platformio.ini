; PlatformIO project for ESP8266 servo controller (Arduino framework).
; Open esp8266/ folder in Cursor/VS Code after installing PlatformIO extension.
; Flash: pio run -t upload
; Monitor: pio device monitor

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient@^2.8
    arduino-libraries/Servo@^1.2.1