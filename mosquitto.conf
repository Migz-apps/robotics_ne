# Use this with the Windows Mosquitto installer.
# Copy to: C:\Program Files\Mosquitto\robotics_ne.conf
# Then add this line at the END of C:\Program Files\Mosquitto\mosquitto.conf:
#   include_file robotics_ne.conf
# Restart service: Restart-Service mosquitto

# Listen on all interfaces so ESP8266 on Wi-Fi can connect
listener 1883 0.0.0.0
allow_anonymous true
